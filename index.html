<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frosterie Inventory Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f9f9f9; }
    h1 { color: #b8860b; text-align: center; }
    .dashboard { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .card { background: white; border-radius: 8px; padding: 20px; width: 380px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .card h2 { margin: 0; font-size: 20px; }
    .card p { font-size: 15px; margin: 4px 0; }
    .low { color: red; }
    .medium { color: orange; }
    .high { color: green; }
    button { background: #b8860b; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    button:hover { background: #daa520; }
    form { margin-top: 20px; }
    input, select { padding: 8px; margin: 5px 0; width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 30px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>🥐 Frosterie Inventory Tracker</h1>

  <div class="dashboard" id="dashboard"></div>

  <!-- Add Cartons -->
  <form id="addCartonForm">
    <h2>Add Cartons</h2>
    <select id="cartonProduct">
      <option value="Mini">Mini Croissant</option>
      <option value="Midi">Midi Croissant</option>
      <option value="Maxi">Maxi Croissant</option>
      <option value="Classic">Classic Croissant</option>
    </select>
    <input type="number" id="cartonQty" placeholder="Cartons" required>
    <button type="submit">Add Cartons</button>
  </form>

  <!-- Add Packs -->
  <form id="addPackForm">
    <h2>Add Packs</h2>
    <select id="packProduct">
      <option value="Mini-20">Mini Pack of 20</option>
      <option value="Mini-25">Mini Pack of 25</option>
      <option value="Mini-40">Mini Bag of 40</option>
      <option value="Mini-80">Mini Bag of 80</option>
      <option value="Midi-6">Midi Pack of 6</option>
      <option value="Midi-8">Midi Pack of 8</option>
      <option value="Midi-35">Midi Bag of 35</option>
      <option value="Maxi-6">Maxi Pack of 6</option>
      <option value="Maxi-30">Maxi Bag of 30</option>
      <option value="Classic-6">Classic Pack of 6</option>
      <option value="Classic-30">Classic Bag of 30</option>
    </select>
    <input type="number" id="packQty" placeholder="Packs" required>
    <button type="submit">Add Packs</button>
  </form>

  <!-- Log Sale -->
  <form id="salesForm">
    <h2>Log Sale</h2>
    <select id="saleProduct">
      <option value="Mini-carton">Mini Carton</option>
      <option value="Midi-carton">Midi Carton</option>
      <option value="Maxi-carton">Maxi Carton</option>
      <option value="Classic-carton">Classic Carton</option>
      <option value="Mini-20">Mini Pack of 20</option>
      <option value="Mini-25">Mini Pack of 25</option>
      <option value="Mini-40">Mini Bag of 40</option>
      <option value="Mini-80">Mini Bag of 80</option>
      <option value="Midi-6">Midi Pack of 6</option>
      <option value="Midi-8">Midi Pack of 8</option>
      <option value="Midi-35">Midi Bag of 35</option>
      <option value="Maxi-6">Maxi Pack of 6</option>
      <option value="Maxi-30">Maxi Bag of 30</option>
      <option value="Classic-6">Classic Pack of 6</option>
      <option value="Classic-30">Classic Bag of 30</option>
    </select>
    <input type="number" id="saleQty" placeholder="Quantity Sold" required>
    <button type="submit">Log Sale</button>
  </form>

  <!-- Export -->
  <button id="exportBtn">📑 Export Report (CSV)</button>

  <!-- Sales Log Table -->
  <h2>Sales Log</h2>
  <table id="salesTable">
    <thead>
      <tr>
        <th>Product</th><th>Unit</th><th>Qty</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Date</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const cartonSizes = { Mini:80, Midi:35, Maxi:30, Classic:30 };
    const cartonPrices = {
      Mini:{cost:96000,sell:168000},
      Midi:{cost:49000,sell:72000},
      Maxi:{cost:60000,sell:80000},
      Classic:{cost:60000,sell:94000}
    };
    const packSelling = {
      "Mini-80":47500,"Mini-40":24000,"Mini-25":15000,"Mini-20":12000,
      "Midi-35":52000,"Midi-8":12000,"Midi-6":9000,
      "Maxi-30":53000,"Maxi-6":10600,
      "Classic-30":65000,"Classic-6":13000
    };

    let inventory = {
      cartons:{Mini:0,Midi:0,Maxi:0,Classic:0},
      packs:{
        "Mini-80":0,"Mini-40":0,"Mini-25":0,"Mini-20":2,
        "Midi-35":0,"Midi-8":0,"Midi-6":6,
        "Maxi-30":0,"Maxi-6":0,
        "Classic-30":0,"Classic-6":0
      }
    };

    let salesLog = [];
    let totalProfit=0;

    function calcPackCost(product){
      let [type,size]=product.split("-");
      let unitCost=cartonPrices[type].cost/cartonSizes[type];
      return unitCost*parseInt(size);
    }

    function renderDashboard(){
      const dash=document.getElementById('dashboard');
      dash.innerHTML='';
      let totalInventoryCost=0;

      ["Mini","Midi","Maxi","Classic"].forEach(type=>{
        let html=`<div class="card"><h2>${type} Croissant</h2>`;
        let cQty=inventory.cartons[type];
        let cLevel=cQty<3?'low':cQty<10?'medium':'high';
        let cartonCost=cartonPrices[type].cost*cQty;
        totalInventoryCost+=cartonCost;
        html+=`<p class="${cLevel}">Cartons: ${cQty} (Value ₦${cartonCost.toLocaleString()})</p>`;

        for(let key in inventory.packs){
          if(key.startsWith(type)){
            let qty=inventory.packs[key];
            let cost=calcPackCost(key)*qty;
            totalInventoryCost+=cost;
            let sell=packSelling[key];
            let margin=((sell-calcPackCost(key))/sell*100).toFixed(1);
            html+=`<p>${key.replace('-', ' ')}: ${qty} (Margin ${margin}%)</p>`;
          }
        }

        let productProfit=salesLog.filter(s=>s.product.startsWith(type))
          .reduce((sum,s)=>sum+s.profit,0);
        html+=`<p><b>Cumulative Profit: ₦${productProfit.toLocaleString()}</b></p></div>`;
        dash.innerHTML+=html;
      });

      dash.innerHTML+=`<div class="card"><h2>Total Inventory Cost</h2><p>₦${totalInventoryCost.toLocaleString()}</p></div>`;
      dash.innerHTML+=`<div class="card"><h2>Total Profit</h2><p>₦${total
