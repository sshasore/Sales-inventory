<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frosterie Inventory</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
h1 { text-align:center; color:#b8860b; }
.card { background:white; padding:15px; margin:10px 0; border-radius:6px; }
button { padding:10px; background:#b8860b; color:white; border:none; }
input, select { padding:8px; width:100%; margin:5px 0; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
</style>
</head>

<body>

<h1>Frosterie Inventory</h1>

<div id="dashboard"></div>

<h3>Add Cartons</h3>
<select id="cartonProduct">
<option value="Mini">Mini</option>
<option value="Midi">Midi</option>
<option value="Maxi">Maxi</option>
<option value="Classic">Classic</option>
</select>
<input type="number" id="cartonQty" placeholder="Qty">
<button onclick="addCarton()">Add</button>

<h3>Add Packs</h3>
<select id="packProduct">
<option value="Mini-20">Mini-20</option>
<option value="Mini-25">Mini-25</option>
<option value="Mini-40">Mini-40</option>
<option value="Mini-80">Mini-80</option>
<option value="Midi-6">Midi-6</option>
<option value="Midi-8">Midi-8</option>
<option value="Midi-35">Midi-35</option>
<option value="Maxi-6">Maxi-6</option>
<option value="Maxi-30">Maxi-30</option>
<option value="Classic-6">Classic-6</option>
<option value="Classic-30">Classic-30</option>
</select>
<input type="number" id="packQty">
<button onclick="addPack()">Add</button>

<h3>Log Sale</h3>
<select id="saleProduct"></select>
<input type="number" id="saleQty">
<button onclick="logSale()">Sell</button>

<button onclick="exportCSV()">Export CSV</button>

<div class="card">
<h3>Weekly Summary</h3>
<p id="weekly"></p>
</div>

<table>
<thead>
<tr>
<th>Product</th><th>Qty</th><th>Revenue</th><th>Profit</th><th>Date</th>
</tr>
</thead>
<tbody id="salesTable"></tbody>
</table>

<script>

const cartonSizes = { Mini:80, Midi:35, Maxi:30, Classic:30 };

const cartonPrices = {
Mini:{cost:96000,sell:168000},
Midi:{cost:49000,sell:72000},
Maxi:{cost:60000,sell:80000},
Classic:{cost:60000,sell:94000}
};

const packSelling = {
"Mini-80":47500,"Mini-40":24000,"Mini-25":15000,"Mini-20":12000,
"Midi-35":52000,"Midi-8":12000,"Midi-6":9000,
"Maxi-30":53000,"Maxi-6":10600,
"Classic-30":65000,"Classic-6":13000
};

let inventory = {
cartons:{Mini:0,Midi:0,Maxi:0,Classic:0},
packs:{}
};

Object.keys(packSelling).forEach(p=>inventory.packs[p]=0);

let salesLog = [];
let totalProfit = 0;

/* LOAD */
const saved = JSON.parse(localStorage.getItem("frosterie"));
if(saved){
inventory = saved.inventory;
salesLog = saved.salesLog;
totalProfit = saved.totalProfit;
}

/* SAVE */
function save(){
localStorage.setItem("frosterie", JSON.stringify({inventory,salesLog,totalProfit}));
}

/* COST */
function packCost(p){
let [t,s]=p.split("-");
return (cartonPrices[t].cost/cartonSizes[t])*parseInt(s);
}

/* DASHBOARD */
function render(){
let html="";

for(let t in inventory.cartons){
html+=`<div class="card"><b>${t}</b><br>Cartons: ${inventory.cartons[t]}</div>`;
}

document.getElementById("dashboard").innerHTML=html;

renderTable();
weeklySummary();
}

/* TABLE */
function renderTable(){
let tb="";
salesLog.forEach(s=>{
tb+=`<tr>
<td>${s.product}</td>
<td>${s.qty}</td>
<td>${s.rev}</td>
<td>${s.profit}</td>
<td>${s.date}</td>
</tr>`;
});
document.getElementById("salesTable").innerHTML=tb;
}

/* WEEKLY SUMMARY */
function weeklySummary(){
let now=new Date();
let weekAgo=new Date();
weekAgo.setDate(now.getDate()-7);

let rev=0, profit=0, qty=0;

salesLog.forEach(s=>{
let d=new Date(s.date);
if(d>=weekAgo){
rev+=s.rev;
profit+=s.profit;
qty+=s.qty;
}
});

document.getElementById("weekly").innerText =
`Sales: ${qty} | Revenue: ₦${rev.toLocaleString()} | Profit: ₦${profit.toLocaleString()}`;
}

/* ACTIONS */

function addCarton(){
let p=document.getElementById("cartonProduct").value;
let q=parseInt(document.getElementById("cartonQty").value);
inventory.cartons[p]+=q;
save();
render();
}

function addPack(){
let p=document.getElementById("packProduct").value;
let q=parseInt(document.getElementById("packQty").value);
inventory.packs[p]+=q;
save();
render();
}

function logSale(){
let p=document.getElementById("saleProduct").value;
let q=parseInt(document.getElementById("saleQty").value);

if(p.includes("carton")){
let t=p.split("-")[0];

if(inventory.cartons[t] < q){
alert("Not enough cartons");
return;
}

inventory.cartons[t]-=q;

let rev=cartonPrices[t].sell*q;
let cost=cartonPrices[t].cost*q;
let profit=rev-cost;

totalProfit+=profit;

salesLog.push({product:p,qty:q,rev,profit,date:new Date()});

}else{

if(inventory.packs[p] < q){
alert("Not enough packs");
return;
}

inventory.packs[p]-=q;

let rev=packSelling[p]*q;
let cost=packCost(p)*q;
let profit=rev-cost;

totalProfit+=profit;

salesLog.push({product:p,qty:q,rev,profit,date:new Date()});
}

save();
render();
}

/* CSV */
function exportCSV(){
let csv="product,qty,revenue,profit,date\n";
salesLog.forEach(s=>{
csv+=`${s.product},${s.qty},${s.rev},${s.profit},${s.date}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

/* INIT */
function initProducts(){
let sel=document.getElementById("saleProduct");
for(let t in inventory.cartons){
let opt=document.createElement("option");
opt.value=`${t}-carton`;
opt.text=`${t} carton`;
sel.appendChild(opt);
}
Object.keys(packSelling).forEach(p=>{
let opt=document.createElement("option");
opt.value=p;
opt.text=p;
sel.appendChild(opt);
});
}

initProducts();
render();

</script>

</body>
</html>
